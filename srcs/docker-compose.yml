services:
  nginx:
    container_name: nginx
    build:
      context: requirements/nginx
    image: nginx
    ports:
      - "443:443"
    volumes:
      - wp-files:/var/www/html
    networks:
      - inception
    depends_on:
      - wordpress
    restart: unless-stopped

  wordpress:
    container_name: wordpress
    build:
      context: requirements/wordpress
    image: wordpress
    volumes:
      - wp-files:/var/www/html
    networks:
      - inception
    depends_on:
      - mariadb
    env_file:
      - .env
    secrets:
      - db_password
      - credentials
    restart: unless-stopped

  mariadb:
    container_name: mariadb
    build:
      context: requirements/mariadb
    image: mariadb
    volumes:
      - wp-database:/var/lib/mysql
    networks:
      - inception
    env_file:
      - .env
    secrets:
      - db_password
      - db_root_password
    restart: unless-stopped

volumes:
  wp-database:
    name: wp-database
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/rnovotny/data/mariadb
  wp-files:
    name: wp-files
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/rnovotny/data/wordpress

networks:
  inception:
    name: inception
    driver: bridge

secrets:
  db_password:
    file: ../secrets/db_password.txt
  db_root_password:
    file: ../secrets/db_root_password.txt
  credentials:
    file: ../secrets/credentials.txt
